<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunset Hills Motion Pictures</title>
    <meta
      name="description"
      content="Sunset Hills Motion Pictures - film production, international production support, and feature film projects."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-transition-overlay" aria-hidden="true"></div>
    <div class="page-curtain" aria-hidden="true">
      <div class="curtain-panel curtain-top">
        <div class="curtain-meta"><span class="rec-dot"></span><span>CUT TO</span></div>
      </div>
      <div class="curtain-panel curtain-bottom">
        <div class="curtain-slate">
          <span class="slate-row"><b>SCN</b><i data-curtain="scn">--</i></span>
          <span class="slate-row"><b>TITLE</b><i data-curtain="title">Loading</i></span>
          <span class="slate-row"><b>STUDIO</b><i>Sunset Hills MP</i></span>
        </div>
      </div>
      <div class="curtain-scan" aria-hidden="true"></div>
    </div>
    <div class="grain" aria-hidden="true"></div>
    <div class="page-progress" aria-hidden="true"><span></span></div>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Sunset Hills Motion Pictures home">
        <span class="brand-mark"><img src="/public/assets/optimized/logo-s.webp" alt="" /></span>
        <span class="brand-text">Sunset Hills<br />Motion Pictures</span>
      </a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
      </button>
      <nav id="site-nav" class="site-nav" aria-label="Primary navigation"></nav>
    </header>

    <main id="app"></main>

    <footer class="site-footer">
      <div class="footer-brand">
        <span class="brand-mark"><img src="/public/assets/optimized/logo-s.webp" alt="" /></span>
        <span>Sunset hills motion pictures© All Rights Reserved.</span>
      </div>
      <a href="/contact/">Contact</a>
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
